<!DOCTYPE html>
<html>
<head>
<title>Travel Booking</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:url("https://images.unsplash.com/photo-1501785888041-af3ef285b470");
  background-size:cover;
  background-position:center;
  color:white;
}

.container{
  text-align:center;
  padding:30px;
}

h1{margin-bottom:10px;}

.places{
  display:flex;
  justify-content:center;
  gap:20px;
  flex-wrap:wrap;
  margin-top:30px;
}

.card{
  background:rgba(0,0,120,0.8);
  padding:15px;
  border-radius:10px;
  width:240px;
  box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.card img{
  width:100%;
  height:160px;
  object-fit:cover;
  border-radius:8px;
}

.card h3{margin:10px 0;}

button{
  padding:10px 15px;
  background:#00aaff;
  border:none;
  border-radius:6px;
  color:white;
  cursor:pointer;
}

button:hover{background:#0088cc;}

.form-box{
  display:none;
  background:rgba(0,0,90,0.9);
  padding:20px;
  border-radius:10px;
  width:340px;
  margin:30px auto;
}

input,textarea{
  width:90%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:6px;
}

.payment{
  background:#001f5c;
  padding:15px;
  border-radius:8px;
  margin-top:15px;
}

/* Success message */
.success-message{
  display:none;
  margin-top:20px;
  background:green;
  color:white;
  padding:15px;
  border-radius:10px;
  font-weight:bold;
  font-size:16px;
}
</style>
</head>

<body>

<div class="container">

<h1>Travel Booking</h1>
<p>Booking Email: <b>ekhongsti@gmail.com</b></p>
<p>Payment Phone: <b>8415833278</b></p>

<div class="places">
  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/5/55/Indian_rhinoceros_in_Kaziranga.jpg">
    <h3>Kaziranga</h3>
    <button onclick="bookPlace('Kaziranga')">Book</button>
  </div>

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/0/0c/Shillong_forest_clouds.jpg">
    <h3>Shillong Forest & Clouds</h3>
    <button onclick="bookPlace('Shillong Forest')">Book</button>
  </div>

  <div class="card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/7/7e/Tawang_Monastery_Arunachal_Pradesh.jpg">
    <h3>Tawang</h3>
    <button onclick="bookPlace('Tawang')">Book</button>
  </div>
</div>

<div class="form-box" id="formBox">

<h2 id="placeName"></h2>

<form id="bookingForm">
  <input type="text" id="name" placeholder="Your Name" required>
  <input type="tel" id="phone" placeholder="Phone Number" required>
  <input type="email" id="email" placeholder="Email">
  <textarea id="address" placeholder="Address"></textarea>

  <button type="submit">Send Booking</button>
</form>

<div class="payment">
  <h3>Payment</h3>
  <p>Send payment using UPI / Google Pay / PhonePe</p>
  <h2>📞 8415833278</h2>
</div>

<!-- Success message -->
<div class="success-message" id="successMessage">
🎉 Booking sent successfully! We will contact you soon.
</div>

</div>
</div>

<!-- Include EmailJS SDK -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>
// Initialize EmailJS with your public key
emailjs.init("YOUR_PUBLIC_KEY"); // Replace with your EmailJS public key

function bookPlace(place){
  document.getElementById("formBox").style.display="block";
  document.getElementById("placeName").innerText="Booking for " + place;
}

// Send booking using EmailJS
document.getElementById("bookingForm").addEventListener("submit", function(e){
  e.preventDefault();

  var params = {
    place: document.getElementById("placeName").innerText,
    name: document.getElementById("name").value,
    phone: document.getElementById("phone").value,
    email: document.getElementById("email").value,
    address: document.getElementById("address").value
  };

  emailjs.send("YOUR_SERVICE_ID", "YOUR_TEMPLATE_ID", params)
    .then(function(response){
      // Show success message
      var msg = document.getElementById("successMessage");
      msg.style.display = "block";

      // Hide after 5 seconds
      setTimeout(function(){
        msg.style.display = "none";
      }, 5000);

      // Reset form
      document.getElementById("bookingForm").reset();
    }, function(error){
      alert("sucess. finish.");
    });
});
</script>

</body>
</html>
